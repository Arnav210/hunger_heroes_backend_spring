<!DOCTYPE HTML>
<html xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml"
    layout:decorate="~{layouts/base}" lang="en">

<th:block layout:fragment="style" th:remove="tag">
    <style>
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            color: #1565C0;
            margin-bottom: 0.5rem;
        }
        
        .tree-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .tree-node {
            margin-left: 1.5rem;
            position: relative;
        }
        
        .tree-node::before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 0;
            height: 100%;
            border-left: 2px solid #CFD8DC;
        }
        
        .tree-root {
            margin-left: 0;
        }
        
        .tree-root::before {
            display: none;
        }
        
        .node-content {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background-color: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            transition: all 0.15s;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        
        .node-content:hover {
            border-color: #1976D2;
            transform: translateX(5px);
        }
        
        .node-content.root {
            background-color: #E3F2FD;
            border-color: #1976D2;
        }
        
        .node-content.parent {
            background-color: #F5F7FA;
        }
        
        .node-name {
            color: #263238;
            font-weight: 500;
        }
        
        .node-badge {
            margin-left: auto;
            padding: 2px 8px;
            background-color: #E3F2FD;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #1565C0;
        }
        
        .collapse-icon {
            margin-left: 0.5rem;
            transition: transform 0.15s;
            color: #78909C;
        }
        
        .collapsed .collapse-icon {
            transform: rotate(-90deg);
        }
        
        .children {
            overflow: hidden;
            transition: max-height 0.3s;
        }
        
        .collapsed + .children {
            max-height: 0 !important;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #78909C;
        }
    </style>
</th:block>

<th:block layout:fragment="title" th:remove="tag">Food Categories - Hunger Heroes</th:block>

<th:block layout:fragment="removable-header" th:remove="tag"></th:block>

<th:block layout:fragment="removable-body" th:remove="tag">
    <div class="container py-4">
        <div class="page-header text-center">
            <h1>Food Categories</h1>
            <p>Hierarchical category tree for food classification</p>
        </div>
        
        <div class="tree-container" id="treeContent">
            <div class="loading">
                <p>Loading category tree...</p>
            </div>
        </div>
    </div>
    
    <script>
        async function loadTree() {
            try {
                const response = await fetch('/api/donations/categories/tree');
                const tree = await response.json();
                renderTree(tree);
            } catch (error) {
                document.getElementById('treeContent').innerHTML = `
                    <div class="loading">
                        <p>Error loading categories: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function renderNode(node, isRoot = false) {
            const hasChildren = node.children && node.children.length > 0;
            const nodeClass = isRoot ? 'root' : (hasChildren ? 'parent' : '');
            
            let childrenHtml = '';
            if (hasChildren) {
                childrenHtml = '<div class="children" style="max-height: 2000px;">';
                for (const child of node.children) {
                    childrenHtml += `<div class="tree-node">${renderNode(child)}</div>`;
                }
                childrenHtml += '</div>';
            }
            
            return `
                <div class="node-content ${nodeClass}" onclick="toggleNode(this)">
                    <span class="node-name">${formatName(node.name)}</span>
                    ${hasChildren ? `<span class="node-badge">${node.children.length} items</span>` : ''}
                    ${hasChildren ? '<span class="collapse-icon">▼</span>' : ''}
                </div>
                ${childrenHtml}
            `;
        }
        
        function formatName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function toggleNode(element) {
            if (element.nextElementSibling && element.nextElementSibling.classList.contains('children')) {
                element.classList.toggle('collapsed');
            }
        }
        
        function renderTree(tree) {
            const container = document.getElementById('treeContent');
            container.innerHTML = `<div class="tree-root">${renderNode(tree, true)}</div>`;
        }
        
        loadTree();
    </script>
</th:block>

</html>
